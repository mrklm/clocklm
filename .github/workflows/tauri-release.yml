name: Tauri Release

on:
  push:
    tags:
      - 'v*.*.*'
      - '*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Tauri on ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            tauri_args: '--bundles appimage'
            binary_dir: 'src-tauri/target/release'
            upload_files: |
              dist-artifacts/Clocklm_linux_${{ github.ref_name }}.AppImage
              dist-artifacts/Clocklm_linux_${{ github.ref_name }}.tar.gz
          - platform: windows-2025
            tauri_args: '--bundles msi'
            binary_dir: 'src-tauri/target/release'
            upload_files: |
              dist-artifacts/Clocklm_windows_${{ github.ref_name }}.msi
              dist-artifacts/Clocklm_windows_${{ github.ref_name }}.zip
          - platform: macos-15-intel
            tauri_args: '--target x86_64-apple-darwin --bundles app'
            binary_dir: 'src-tauri/target/x86_64-apple-darwin/release'
            upload_files: |
              dist-artifacts/Clocklm_macos_x64_${{ github.ref_name }}.tar.gz

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Resolve release version
        id: app_version
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          package_version="$(node -p 'require("./package.json").version')"
          if [ "$version" != "$package_version" ]; then
            echo "Tag version ($version) does not match package.json version ($package_version)." >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app v${{ steps.app_version.outputs.version }}
        id: tauri_build
        run: npm run tauri:build -- ${{ matrix.tauri_args }}

      - name: Prepare Linux artifacts
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          mkdir -p dist-artifacts/Clocklm_linux_${{ github.ref_name }}
          cp src-tauri/target/release/bundle/appimage/*.AppImage dist-artifacts/Clocklm_linux_${{ github.ref_name }}.AppImage
          cp src-tauri/target/release/clocklm dist-artifacts/Clocklm_linux_${{ github.ref_name }}/clocklm
          tar -C dist-artifacts -czf dist-artifacts/Clocklm_linux_${{ github.ref_name }}.tar.gz Clocklm_linux_${{ github.ref_name }}
          test -f dist-artifacts/Clocklm_linux_${{ github.ref_name }}.AppImage
          test -f dist-artifacts/Clocklm_linux_${{ github.ref_name }}.tar.gz

      - name: Prepare Windows artifacts
        if: matrix.platform == 'windows-2025'
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path dist-artifacts | Out-Null
          Copy-Item src-tauri/target/release/bundle/msi/*.msi dist-artifacts/Clocklm_windows_${{ github.ref_name }}.msi
          New-Item -ItemType Directory -Force -Path dist-artifacts/Clocklm_windows_${{ github.ref_name }} | Out-Null
          Copy-Item src-tauri/target/release/clocklm.exe dist-artifacts/Clocklm_windows_${{ github.ref_name }}/clocklm.exe
          Compress-Archive -Path dist-artifacts/Clocklm_windows_${{ github.ref_name }}/* -DestinationPath dist-artifacts/Clocklm_windows_${{ github.ref_name }}.zip -Force
          if (-not (Test-Path "dist-artifacts/Clocklm_windows_${{ github.ref_name }}.msi")) { throw "Missing Windows MSI artifact" }
          if (-not (Test-Path "dist-artifacts/Clocklm_windows_${{ github.ref_name }}.zip")) { throw "Missing Windows ZIP artifact" }

      - name: Prepare macOS artifacts
        if: matrix.platform == 'macos-15-intel'
        shell: bash
        run: |
          mkdir -p dist-artifacts
          tar -C src-tauri/target/x86_64-apple-darwin/release/bundle/macos -czf dist-artifacts/Clocklm_macos_x64_${{ github.ref_name }}.tar.gz Clocklm.app
          test -f dist-artifacts/Clocklm_macos_x64_${{ github.ref_name }}.tar.gz

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Clocklm v${{ steps.app_version.outputs.version }}
          body: |
            Installateurs automatiques Clocklm v${{ steps.app_version.outputs.version }} pour Linux, Windows et macOS.
          draft: false
          prerelease: false
          generate_release_notes: true
          files: ${{ matrix.upload_files }}
