name: Tauri Release

on:
  push:
    tags:
      - 'v*.*.*'
      - '*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Tauri on ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ''
            asset_prefix: Clocklm_linux
          - platform: windows-2025
            args: ''
            asset_prefix: Clocklm_windows
          - platform: macos-15-intel
            args: '--target x86_64-apple-darwin'
            asset_prefix: Clocklm_macos_x64

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Read app version
        id: app_version
        run: echo "version=$(node -p 'require(\"./package.json\").version')" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install npm dependencies
        run: npm ci

      - name: Build and publish Tauri app v${{ steps.app_version.outputs.version }}
        uses: tauri-apps/tauri-action@action-v0.6.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: .
          tagName: ${{ github.ref_name }}
          releaseName: Clocklm v${{ steps.app_version.outputs.version }}
          releaseBody: |
            Installateurs automatiques Clocklm v${{ steps.app_version.outputs.version }} pour Linux, Windows et macOS.
          releaseDraft: false
          prerelease: false
          generateReleaseNotes: true
          args: ${{ matrix.args }}
          assetNamePattern: '${{ matrix.asset_prefix }}_v${{ steps.app_version.outputs.version }}[ext]'
